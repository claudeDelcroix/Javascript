<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ TodoList Élégante | Functional Approach</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="gradient-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="app-container">
        <div class="glass-card">
            <div class="header">
                <div class="header-icon">
                    <i class="fas fa-check-circle"></i>
                </div>
                <h1>Список задач</h1>
                <p class="subtitle">Организуйте свой день красиво</p>
            </div>

            <div class="input-wrapper">
                <div class="input-group-modern">
                    <i class="fas fa-pen"></i>
                    <input type="text" id="taskInput" placeholder="Что нужно сделать?" autocomplete="off">
                    <button id="addBtn">
                        <i class="fas fa-plus"></i>
                        <span>Добавить</span>
                    </button>
                </div>
            </div>

            <div class="filters-modern">
                <button class="filter-btn active" data-filter="all">
                    <i class="fas fa-list-ul"></i>
                    <span>Все</span>
                    <span class="count" id="allCount">0</span>
                </button>
                <button class="filter-btn" data-filter="active">
                    <i class="fas fa-circle-notch"></i>
                    <span>Активные</span>
                    <span class="count" id="activeCount">0</span>
                </button>
                <button class="filter-btn" data-filter="completed">
                    <i class="fas fa-check-circle"></i>
                    <span>Выполненные</span>
                    <span class="count" id="completedCount">0</span>
                </button>
            </div>

            <div class="task-stats">
                <div class="stat-card">
                    <span class="stat-label">Всего</span>
                    <span class="stat-value" id="totalCount">0</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-card">
                    <span class="stat-label">Осталось</span>
                    <span class="stat-value highlight" id="remainingCount">0</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-card">
                    <span class="stat-label">Выполнено</span>
                    <span class="stat-value" id="completedTotal">0</span>
                </div>
            </div>

            <ul class="task-list-modern" id="taskList">
                <!-- Les tâches seront insérées ici -->
            </ul>

            <div class="footer-modern">
                <div class="footer-info">
                    <i class="far fa-calendar-alt"></i>
                    <span>Сегодня, <span id="currentDate"></span></span>
                </div>
                <button class="clear-completed" id="clearCompleted">
                    <i class="fas fa-trash-alt"></i>
                    <span>Очистить выполненные</span>
                </button>
            </div>
        </div>
    </div>

    <div class="toast-notification" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMessage"></span>
    </div>

    <script src="script.js"></script>
</body>
</html>
